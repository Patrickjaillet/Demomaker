[pytest]
# ── MEGADEMO — configuration pytest ────────────────────────────────────────
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions= test_*

# Marqueurs personnalisés
markers =
    unit:        Tests unitaires purs (pas de GPU, pas de fichiers)
    integration: Tests d'intégration (accès fichiers, contexte GL headless)
    slow:        Tests lents (> 5 s) — sautés par défaut en CI rapide
    gpu:         Tests nécessitant un contexte OpenGL (moderngl standalone)

# Filtres d'avertissements
filterwarnings =
    ignore::DeprecationWarning:pygame
    ignore::UserWarning:moderngl

# Affichage
addopts =
    -v
    --tb=short
    --color=yes
    -p no:warnings
    --strict-markers
